<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Predictions - IPL Toss Predictions</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">🏏 IPL <span>TOSS PRED</span> '26</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="schedule.html">Schedule</a>
            <a href="admin.html">Dashboard</a>
            <span id="nav-user-slot"><a href="#" class="login-btn" onclick="handleLogout()">Logout</a></span>
        </div>
    </nav>

    <div class="admin-container">
        <div class="dashboard-header">
            <h2>Update Match Predictions</h2>
            <p>Select a match below to update its toss prediction. Changes reflect instantly on the public website.</p>
        </div>

        <div id="loader" class="loader">Loading matches...</div>
        
        <div class="admin-grid" id="admin-matches-container">
            <!-- Dynamic Content from JS -->
        </div>

        <!-- Modal for Updating Prediction -->
        <div id="update-modal" class="modal">
            <div class="modal-content glass-panel">
                <span class="close-btn" onclick="closeModal()">&times;</span>
                <h3>Update Prediction</h3>
                <p id="modal-match-details"></p>
                <form id="update-prediction-form">
                    <input type="hidden" id="match-id">
                    <div class="input-group">
                        <label for="prediction-select">Predicted Winner</label>
                        <select id="prediction-select">
                            <!-- Populated dynamically -->
                        </select>
                    </div>
                    <button type="submit" class="cta-btn full-width">Save Prediction</button>
                    <p id="modal-msg" class="success-text"></p>
                </form>
            </div>
        </div>

        <div id="profile-modal" class="modal">
            <div class="modal-content glass-panel">
                <span class="close-btn" onclick="closeProfileModal()">&times;</span>
                <h3>Profile Settings</h3>
                <form id="profile-form">
                    <div class="input-group">
                        <label for="profile-display-name">Display Name</label>
                        <input type="text" id="profile-display-name" required>
                    </div>
                    <div class="input-group">
                        <label for="profile-avatar">Profile Picture</label>
                        <input type="file" id="profile-avatar" accept="image/*">
                    </div>
                    <button type="submit" class="cta-btn full-width">Save Profile</button>
                    <p id="profile-msg" class="success-text"></p>
                </form>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', checkAdminAuthAndLoad);
    </script>
</body>
</html>
