<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Predictions - IPL Toss Predictions</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">🏏 IPL <span>TOSS PRED</span> '26</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="schedule.html">Schedule</a>
            <a href="admin.html">Dashboard</a>
            <span id="nav-user-slot"><a href="#" class="login-btn" onclick="handleLogout()">Logout</a></span>
        </div>
    </nav>

    <div class="admin-container">
        <div class="dashboard-header">
            <h2>Update Match Predictions</h2>
            <p>Select a match below to update its toss prediction or add a missing match. Changes reflect instantly on the public website.</p>
        </div>

        <div class="glass-panel" style="max-width: 100%; margin-bottom: 2rem; padding: 1.5rem;">
            <h3 style="margin-bottom: 1rem; color: var(--primary);">+ Add New Match</h3>
            <form id="add-match-form" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
                <input type="date" id="add-match-date" required style="padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(0,0,0,0.4); color: white;">
                <input type="text" id="add-match-time" placeholder="Time (e.g., 19:30)" required style="padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(0,0,0,0.4); color: white;">
                <input type="text" id="add-match-t1" placeholder="Team 1" required style="padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(0,0,0,0.4); color: white;">
                <input type="text" id="add-match-t2" placeholder="Team 2" required style="padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(0,0,0,0.4); color: white;">
                <input type="text" id="add-match-stadium" placeholder="Stadium" style="padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(0,0,0,0.4); color: white;">
                <button type="submit" class="cta-btn" style="padding: 0.8rem; border-radius: 8px;">Add Match</button>
            </form>
            <p id="add-match-msg" style="margin-top: 1rem; font-size: 0.9rem;"></p>
        </div>

        <div id="loader" class="loader">Loading matches...</div>
        
        <div class="admin-grid" id="admin-matches-container">
            <!-- Dynamic Content from JS -->
        </div>

        <!-- Modal for Updating Prediction -->
        <div id="update-modal" class="modal">
            <div class="modal-content glass-panel">
                <span class="close-btn" onclick="closeModal()">&times;</span>
                <h3>Update Prediction</h3>
                <p id="modal-match-details"></p>
                <form id="update-prediction-form">
                    <input type="hidden" id="match-id">
                    <div class="input-group">
                        <label for="prediction-select">Predicted Winner</label>
                        <select id="prediction-select">
                            <!-- Populated dynamically -->
                        </select>
                    </div>
                    <button type="submit" class="cta-btn full-width">Save Prediction</button>
                    <p id="modal-msg" class="success-text"></p>
                </form>
            </div>
        </div>

        <div id="profile-modal" class="modal">
            <div class="modal-content glass-panel">
                <span class="close-btn" onclick="closeProfileModal()">&times;</span>
                <h3>Profile Settings</h3>
                <form id="profile-form">
                    <div class="input-group">
                        <label for="profile-display-name">Display Name</label>
                        <input type="text" id="profile-display-name" required>
                    </div>
                    <div class="input-group">
                        <label for="profile-avatar">Profile Picture</label>
                        <input type="file" id="profile-avatar" accept="image/*">
                    </div>
                    <button type="submit" class="cta-btn full-width">Save Profile</button>
                    <p id="profile-msg" class="success-text"></p>
                </form>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', checkAdminAuthAndLoad);
    </script>
</body>
</html>
