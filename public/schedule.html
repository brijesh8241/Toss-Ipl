<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Schedule - IPL 2026 Toss Predictions</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">🏏 IPL <span>TOSS PRED</span> '26</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="schedule.html" class="active">Schedule</a>
            <span id="nav-user-slot"><a href="login.html" class="login-btn">Login</a></span>
        </div>
    </nav>

    <section style="padding: 3rem 5%; max-width: 1200px; margin: 0 auto;">
        <h2 style="text-align: center; font-size: 2.5rem; margin-bottom: 0.5rem;">Full Match <span class="gradient-text">Schedule</span></h2>
        <p id="schedule-summary" style="text-align: center; color: var(--text-muted); margin-bottom: 2rem; font-size: 1rem;"></p>

        <!-- Loading State -->
        <div id="loader" class="loader">Loading matches...</div>

        <!-- Matches Container -->
        <div id="matches-container" class="matches-grid">
            <!-- Dynamic Content from JS -->
        </div>
    </section>

    <footer>
        <p>&copy; 2026 IPL Toss Predictions. All rights reserved.</p>
    </footer>

    <div id="profile-modal" class="modal">
        <div class="modal-content glass-panel">
            <span class="close-btn" onclick="closeProfileModal()">&times;</span>
            <h3>Profile Settings</h3>
            <form id="profile-form">
                <div class="input-group">
                    <label for="profile-display-name">Display Name</label>
                    <input type="text" id="profile-display-name" required>
                </div>
                <div class="input-group">
                    <label for="profile-avatar">Profile Picture</label>
                    <input type="file" id="profile-avatar" accept="image/*">
                </div>
                <button type="submit" class="cta-btn full-width">Save Profile</button>
                <p id="profile-msg" class="success-text"></p>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', fetchScheduleMatches);
    </script>
</body>
</html>
